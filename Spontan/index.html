<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spontan — 遇见下一段旅程</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <span class="logo">Spontan</span>
      <div class="header__right">
        <span class="counter" id="counter">1 / 4</span>
        <a class="btn-auth" id="btnAuth" href="login.html">登录</a>
        <button class="btn-likes" id="btnLikes" type="button">
          <span>我的心动</span>
          <span class="btn-likes__heart">❤️</span>
          <span class="btn-likes__badge" id="likesBadge" hidden>0</span>
        </button>
        <button class="btn-publish" id="btnPublish" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          <span>发布旅行</span>
        </button>
      </div>
    </header>

    <main class="main">
      <div class="stack-area">
        <div class="card-stack-wrap">
          <button class="card-undo" id="btnUndo" type="button" hidden aria-label="撤回上一张">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 10h10a5 5 0 0 1 5 5v2M3 10l4-4M3 10l4 4"/>
            </svg>
          </button>
          <div class="card-stack" id="cardStack" aria-live="polite"></div>
        </div>
      </div>
    </main>

    <footer class="actions">
      <button class="btn btn-skip" id="btnSkip" type="button" aria-label="跳过">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
        <span>跳过</span>
      </button>
      <button class="btn btn-join" id="btnJoin" type="button" aria-label="加入">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
        <span>加入</span>
      </button>
    </footer>
  </div>

  <div class="toast" id="toast" role="status" aria-hidden="true"></div>

  <div class="modal" id="modal" aria-hidden="true">
    <div class="modal__backdrop" id="modalBackdrop"></div>
    <div class="modal__panel" role="dialog" aria-labelledby="modalTitle" aria-modal="true">
      <button class="modal__close" id="modalClose" type="button" aria-label="关闭">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
      <h2 class="modal__title" id="modalTitle">发布一段旅程</h2>
      <p class="modal__subtitle">填写信息，招募志同道合的旅伴</p>
      <form class="modal__form" id="publishForm">
        <label class="field">
          <span class="field__label">目的地</span>
          <input class="field__input" type="text" name="destination" placeholder="冰岛、巴厘岛…" required />
        </label>
        <label class="field">
          <span class="field__label">招募宣言</span>
          <textarea class="field__textarea" name="message" rows="3" placeholder="想去追极光，招募一个能开车的小伙伴…" required></textarea>
        </label>
        <label class="field">
          <span class="field__label">旅行时间</span>
          <input class="field__input" type="text" name="date" placeholder="12月10日 – 12月18日" required />
        </label>
        <label class="field">
          <span class="field__label">封面图片链接</span>
          <input class="field__input" type="url" name="image" id="imageInput" placeholder="https://…" />
          <span class="field__hint">留空将使用默认风景图</span>
        </label>
        <button class="modal__submit" type="submit">发布卡片</button>
      </form>
    </div>
  </div>

  <div class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer__backdrop" id="drawerBackdrop"></div>
    <aside class="drawer__panel" role="dialog" aria-labelledby="drawerTitle" aria-modal="true">
      <div class="drawer__header">
        <div>
          <h2 class="drawer__title" id="drawerTitle">我的心动墙</h2>
          <p class="drawer__subtitle" id="drawerSubtitle">收藏的旅程，随时回顾</p>
        </div>
        <button class="drawer__close" id="drawerClose" type="button" aria-label="关闭">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="drawer__body">
        <div class="drawer__empty" id="favoritesEmpty">
          <span class="drawer__empty-icon">💫</span>
          <p class="drawer__empty-title">还没有心动的旅程</p>
          <p class="drawer__empty-text">点击「加入」或向右滑动，收藏你感兴趣的旅行</p>
        </div>
        <ul class="drawer__list" id="favoritesList"></ul>
      </div>
    </aside>
  </div>

  <script src="app.js"></script>
</body>
</html>
